<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — LEBAS FASHION</title>
  <meta name="description" content="LEBAS FASHION admin panel login">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="LEBAS FASHION DESIGNINGLogo.png" type="image/png">
</head>
<body class="login-body">

  <!-- Background Decorations -->
  <div class="login-bg-decor top"></div>
  <div class="login-bg-decor bottom"></div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">
      <img src="LEBAS FASHION DESIGNINGLogo.png" alt="LEBAS FASHION" class="login-logo">
      <h1 class="login-title">Admin Panel</h1>
      <p class="login-subtitle">Sign in to manage your store</p>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="admin@lebasfashion.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      </form>

      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script>
    // Check if already logged in
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'admin.html';
      }
    });

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.textContent = '';

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'admin.html';
      } catch (error) {
        let msg = 'Login failed. Please try again.';
        if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
        else if (error.code === 'auth/wrong-password') msg = 'Incorrect password.';
        else if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
        else if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
        errorEl.textContent = msg;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
